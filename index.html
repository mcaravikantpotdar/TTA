<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="appTitle">Academic Architect v8.00</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body onclick="window.App.closeAllStrips(event)" onmousemove="window.App.updateTooltipPos(event)">

    <div id="tooltip"></div>
    <div id="toast-container"></div> 

    <header class="h-16 bg-white shadow-sm border-b-2 border-slate-300 flex justify-between items-center px-6 sticky top-0 z-[1000] flex-shrink-0">
        <div class="flex items-center gap-4">
            <div class="h-10 w-10 bg-black rounded-lg flex items-center justify-center text-white font-black text-xl shadow-lg">LA</div>
            <div>
                <h1 id="headerAppName" class="text-xl font-black text-slate-800 uppercase tracking-tighter">Academic Architect</h1>
                <p id="headerSchoolName" class="text-[10px] font-black text-indigo-600 tracking-widest uppercase">Version 8.00 - Modular Cloud Sync</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <input type="range" min="0.5" max="1.5" step="0.05" value="1" oninput="document.documentElement.style.setProperty('--grid-scale', this.value)" class="mr-2">
            
            <button onclick="window.App.openConfigModal()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-black hover:bg-black transition shadow-lg">⚙️ SETTINGS</button>
            
            <button onclick="window.App.openReportModal()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black hover:bg-blue-700 transition shadow-lg">REPORTS 🖨️</button>
            <button onclick="window.App.openAdjustments()" class="bg-purple-600 text-white px-4 py-2 rounded-xl text-[10px] font-black hover:bg-purple-700 transition shadow-lg">ADJUSTMENTS</button>
            <div class="w-px h-6 bg-slate-300 mx-1"></div>
            
            <button id="btnDriveSync" onclick="window.App.syncWithGoogleDrive()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-black hover:bg-emerald-700 transition shadow-sm hidden">☁️ DRIVE SYNC</button>
            
            <button onclick="window.App.wipeClear()" class="bg-rose-600 text-white px-4 py-2 rounded-xl text-[10px] font-black hover:bg-rose-700 transition shadow-sm" title="Wipe Schedule">WIPE CLEAR</button>
            <button onclick="window.App.undo()" class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-xl text-[10px] font-black hover:bg-indigo-200 transition shadow-sm" title="Undo (Ctrl+Z)">UNDO</button>
            <button onclick="window.App.exportData()" class="bg-black text-white px-5 py-2 rounded-xl text-[10px] font-black shadow-lg hover:bg-slate-800 transition">SAVE FILE</button>
            <button onclick="document.getElementById('fileIn').click()" class="bg-amber-600 text-white px-5 py-2 rounded-xl text-[10px] font-black shadow-lg hover:bg-amber-500 transition">LOAD FILE</button>
            <input type="file" id="fileIn" class="hidden" onchange="window.App.importData(event)">
        </div>
    </header>

    <div id="clashBanner" class="clash-banner"></div>

    <div class="app-shell">
        <aside id="leftSidebar" class="sidebar sidebar-left" onclick="window.App.expandSidebar(event, 'leftSidebar')">
            <div class="flex justify-between items-center p-3 pb-2 border-b-2 border-slate-100 hide-on-collapse">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Subjects</span>
                <div class="flex gap-1">
                    <button onclick="window.App.openRegModal('sub')" class="text-indigo-600 font-black text-lg px-2 hover:bg-indigo-50 rounded">+</button>
                    <button onclick="window.App.toggleSidebar(event, 'leftSidebar')" class="toggle-btn">«</button>
                </div>
            </div>
            <div class="show-on-collapse">SUBJECTS »</div>
            <div id="subPool" class="overflow-y-auto custom-scroll p-3 flex-1 hide-on-collapse"></div>
        </aside>

        <main id="scrollContainer" class="workspace custom-scroll">
            <div id="mainGrid" class="main-grid"></div>
        </main>

        <aside id="rightSidebar" class="sidebar sidebar-right" onclick="window.App.expandSidebar(event, 'rightSidebar')">
            <div class="flex justify-between items-center p-3 pb-2 border-b-2 border-slate-100 hide-on-collapse">
                <div class="flex gap-1">
                    <button onclick="window.App.toggleSidebar(event, 'rightSidebar')" class="toggle-btn">»</button>
                    <button onclick="window.App.openRegModal('tea')" class="text-emerald-600 font-black text-lg px-2 hover:bg-emerald-50 rounded">+</button>
                </div>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Teachers</span>
            </div>
            <div class="show-on-collapse">« TEACHERS</div>
            <div id="teaPool" class="overflow-y-auto custom-scroll p-3 flex-1 hide-on-collapse"></div>
        </aside>
    </div>

    <div id="adjModal" class="adj-modal">
        <div class="h-20 bg-white border-b-2 border-slate-200 flex justify-between items-center px-10 shadow-sm sticky top-0 z-50 shrink-0">
            <h2 class="text-2xl font-black uppercase text-slate-800">Daily Adjustments</h2>
            <div class="flex gap-4">
                <button onclick="window.App.closeAdjustments()" class="px-6 py-2 rounded-xl text-slate-500 font-black hover:bg-slate-100">CANCEL / CLOSE</button>
            </div>
        </div>

        <div id="adjView1" class="p-10 max-w-7xl mx-auto w-full flex-1">
            <div class="mb-8 bg-white p-6 rounded-2xl shadow-sm border-2 border-slate-200">
                <label class="block text-xs font-black uppercase text-slate-500 mb-2">1. Select Target Date</label>
                <input type="date" id="adjDate" class="w-full max-w-sm border-2 border-slate-300 p-3 rounded-lg font-black text-lg text-slate-800 outline-none focus:border-purple-500" onchange="window.App.renderAdjTeachers()">
            </div>
            <div class="mb-8">
                <div class="flex justify-between items-end mb-4">
                    <label class="block text-xs font-black uppercase text-slate-500">2. Select Absent Teachers</label>
                    <button onclick="window.App.goToAssignView()" class="bg-purple-600 text-white px-8 py-3 rounded-xl font-black text-sm hover:bg-purple-700 shadow-lg transition">NEXT: ASSIGN SUBS →</button>
                </div>
                <div id="adjTeaGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
            </div>
        </div>

        <div id="adjView2" class="p-10 max-w-7xl mx-auto w-full hidden flex-col flex-1 h-full">
            <div class="flex justify-between items-center mb-6 shrink-0 bg-white p-4 rounded-xl border-2 border-slate-200 shadow-sm">
                <button onclick="window.App.goToSetupView()" class="px-4 py-2 border-2 border-slate-300 rounded-lg font-black text-xs text-slate-600 hover:bg-slate-50 shadow-sm bg-white">← BACK</button>
                <div class="flex items-center gap-6">
                    <label class="flex items-center gap-2 cursor-pointer bg-slate-100 px-4 py-2 rounded-lg border border-slate-300">
                        <input type="checkbox" id="toggleConsecutiveEngine" checked class="w-4 h-4 accent-purple-600">
                        <span class="text-xs font-black text-slate-700 uppercase tracking-tight">Avoid Back-to-Back Slots</span>
                    </label>
                    <button onclick="window.App.autoAdjust()" class="bg-purple-600 text-white px-6 py-2 rounded-lg font-black text-sm hover:bg-purple-700 shadow-md">⚡ AUTO-ADJUST (FAIR LOAD)</button>
                </div>
            </div>
            <div class="flex gap-8 flex-1 overflow-hidden">
                <div class="flex-1 flex flex-col min-w-0">
                    <h3 class="text-xs font-black uppercase text-slate-500 mb-3 shrink-0">Affected Periods</h3>
                    <div id="adjPeriodsList" class="flex-1 overflow-y-auto custom-scroll pr-2 flex flex-col gap-3"></div>
                </div>
                <div class="w-80 flex flex-col shrink-0 bg-white p-4 rounded-2xl border-2 border-slate-200 shadow-sm">
                    <h3 class="text-xs font-black uppercase text-slate-500 mb-3 shrink-0">Available Substitutes</h3>
                    <div id="adjSubsList" class="flex-1 overflow-y-auto custom-scroll pr-1 flex flex-col gap-2"></div>
                </div>
            </div>
            <div class="mt-6 flex gap-4 items-center shrink-0 border-t-2 border-slate-200 pt-6">
                <button onclick="window.App.printCirculation()" class="flex-1 bg-purple-600 text-white px-6 py-4 rounded-xl font-black hover:bg-purple-700 shadow-xl transition text-sm">PRINT CIRCULATION</button>
                <button onclick="window.App.printTeacherDailySlips()" class="flex-1 bg-indigo-600 text-white px-6 py-4 rounded-xl font-black hover:bg-indigo-700 shadow-xl transition text-sm">PRINT TEACHER SLIPS</button>
                <button onclick="window.App.clearAllCovers()" class="px-8 py-4 rounded-xl font-black text-rose-600 bg-rose-50 border-2 border-rose-200 hover:bg-rose-100 transition text-sm shrink-0">CLEAR ALL SUBS</button>
            </div>
        </div>
    </div>

    <div id="configModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[40000] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 border-2 border-slate-200">
            <h2 class="font-black uppercase text-xl mb-6 border-b-2 border-slate-100 pb-3 text-slate-800">System Identity</h2>
            
            <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">App Name</label>
            <input id="cfgAppName" type="text" class="w-full border-2 border-slate-300 p-3 rounded-xl mb-4 font-bold text-sm outline-none focus:border-slate-800" placeholder="e.g. Academic Architect">

            <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">School Name</label>
            <input id="cfgSchoolName" type="text" class="w-full border-2 border-slate-300 p-3 rounded-xl mb-4 font-bold text-sm outline-none focus:border-slate-800" placeholder="e.g. GSSS KHALYANI">

            <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">Security Access PIN</label>
            <input id="cfgAccessPin" type="password" class="w-full border-2 border-slate-300 p-3 rounded-xl mb-8 font-bold text-sm tracking-widest outline-none focus:border-slate-800" placeholder="4-Digit Lock PIN">

            <div class="flex gap-3">
                <button onclick="window.App.saveGlobalBrandingConfig()" class="flex-1 bg-black text-white p-3 rounded-xl font-black text-sm shadow-md hover:bg-slate-800 transition">SAVE CHANGES</button>
                <button onclick="window.App.closeModal('configModal')" class="flex-1 bg-slate-100 text-slate-600 p-3 rounded-xl font-black text-sm hover:bg-slate-200 transition">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="lockModal" class="fixed inset-0 bg-slate-900/90 hidden items-center justify-center z-[50000] backdrop-blur-md">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-80 text-center border-2 border-black">
            <div class="w-16 h-10 bg-slate-100 mx-auto mb-4 flex items-center justify-center font-black rounded-lg border">🔒</div>
            <h2 class="font-black uppercase text-lg mb-2 text-slate-800 tracking-tight">System Locked</h2>
            <p class="text-xs text-slate-400 font-bold mb-6 uppercase tracking-wide">Enter PIN to Access Timetable</p>
            <input id="challengePinField" type="password" class="w-full border-4 border-black text-center p-3 rounded-xl mb-6 font-black text-2xl tracking-widest outline-none focus:border-indigo-600" placeholder="••••">
            <button onclick="window.App.verifySecurityChallenge()" class="w-full bg-black text-white py-3 rounded-xl font-black text-sm hover:bg-slate-800 shadow-lg tracking-wide uppercase">Unlock Matrix</button>
        </div>
    </div>

    <div id="reportModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[40000] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 border-2 border-slate-200">
            <h2 class="font-black uppercase text-xl mb-6 border-b-2 border-slate-100 pb-3 text-slate-800">Generate Report</h2>
            
            <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">REPORT TYPE</label>
            <select id="repType" class="w-full border-2 border-slate-300 p-3 rounded-xl mb-5 font-bold text-sm outline-none focus:border-blue-500" onchange="window.App.updateReportTargets()">
                <option value="class">Class-Wise Timetable</option>
                <option value="teacher">Teacher-Wise Timetable</option>
                <option value="matrix">Master Matrix (Proportional)</option>
            </select>

            <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">SELECT TARGET</label>
            <select id="repTarget" class="w-full border-2 border-slate-300 p-3 rounded-xl mb-8 font-bold text-sm outline-none focus:border-blue-500"></select>

            <div class="flex gap-3">
                <button onclick="window.App.executePrintReport()" class="flex-1 bg-emerald-600 text-white p-3 rounded-xl font-black text-sm shadow-md hover:bg-emerald-700 transition">GENERATE PDF</button>
                <button onclick="window.App.closeModal('reportModal')" class="flex-1 bg-slate-100 text-slate-600 p-3 rounded-xl font-black text-sm hover:bg-slate-200 transition">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="printLayout" class="print-only"></div>
    <div id="reportLayout" class="print-only"></div>

    <div id="regModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[20000] backdrop-blur-sm">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-80 border-2 border-black">
            <h2 id="modalTitle" class="font-black uppercase text-sm mb-4 border-b-2 pb-2">Entry Manager</h2>
            <input id="modalShort" type="text" placeholder="Short Form" class="w-full border-2 p-2 rounded mb-2 uppercase font-black">
            <input id="modalFull" type="text" placeholder="Full Name" class="w-full border-2 p-2 rounded mb-2 text-sm font-bold">
            <input id="modalDesig" type="text" placeholder="Designation (Optional)" class="w-full border-2 p-2 rounded mb-4 text-[10px] font-bold">
            <div class="flex gap-2">
                <button onclick="window.App.saveRegistry()" class="flex-1 bg-black text-white p-2 rounded font-black text-xs">SAVE</button>
                <button onclick="window.App.closeModal('regModal')" class="flex-1 bg-slate-100 p-2 rounded font-black text-xs">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="clsModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[20000] backdrop-blur-sm">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-72 border-2 border-black">
            <h2 id="clsTitle" class="font-black uppercase text-sm mb-4 border-b-2 pb-2">Class Manager</h2>
            <input id="clsName" type="text" placeholder="e.g. 10TH" class="w-full border-2 p-2 rounded mb-4 uppercase font-black text-center text-lg outline-none focus:border-indigo-400">
            <div class="flex gap-2">
                <button onclick="window.App.saveClass()" class="flex-1 bg-black text-white p-2 rounded font-black text-xs hover:bg-slate-800">SAVE</button>
                <button onclick="window.App.closeModal('clsModal')" class="flex-1 bg-slate-100 text-slate-500 p-2 rounded font-black text-xs hover:bg-slate-200">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="perModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[20000] backdrop-blur-sm">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-80 border-2 border-black">
            <h2 id="perTitle" class="font-black uppercase text-sm mb-4 border-b-2 pb-2">Period Guardian</h2>
            <input id="perName" type="text" placeholder="P1, P2, etc." class="w-full border-2 p-2 rounded mb-2 uppercase font-black">
            <div class="flex gap-2 mb-2">
                <div class="flex-1">
                    <label class="text-[9px] font-black opacity-40">START</label>
                    <input id="perS" type="time" class="w-full border-2 p-1 rounded font-bold text-xs">
                </div>
                <div class="flex-1">
                    <label class="text-[9px] font-black opacity-40">END</label>
                    <input id="perE" type="time" class="w-full border-2 p-1 rounded font-bold text-xs">
                </div>
            </div>
            <label class="flex items-center gap-2 mb-4 cursor-pointer">
                <input type="checkbox" id="perRecess" class="w-4 h-4">
                <span class="text-[10px] font-black">MARK AS RECESS</span>
            </label>
            <div class="flex gap-2">
                <button onclick="window.App.savePeriod()" class="flex-1 bg-black text-white p-2 rounded font-black text-xs">SAVE</button>
                <button onclick="window.App.closeModal('perModal')" class="flex-1 bg-slate-100 p-2 rounded font-black text-xs">CANCEL</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
